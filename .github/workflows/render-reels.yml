name: Render Esep bukhfirma reels

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'marketing-video/remotion/**'
      - '.github/workflows/render-reels.yml'

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Remotion/Chromium Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libgbm1 libxrandr2 libxkbcommon0 \
            libxfixes3 libxcomposite1 libxdamage1 libatk-bridge2.0-0 \
            libpango-1.0-0 libcairo2 libcups2 || true
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2 || true

      - name: Install deps
        working-directory: marketing-video
        run: npm ci

      - name: Render reel 1 (Хаос → порядок)
        working-directory: marketing-video
        run: npx remotion render EsepBuhReel1 out/esep-buh-reel-1.mp4 --codec=h264 --crf=18

      - name: Render reel 2 (10 секунд на клиента)
        working-directory: marketing-video
        run: npx remotion render EsepBuhReel2 out/esep-buh-reel-2.mp4 --codec=h264 --crf=18

      - name: Render walkthrough (обучающее видео)
        working-directory: marketing-video
        run: npx remotion render EsepWalkthrough out/esep-walkthrough.mp4 --codec=h264 --crf=18

      - name: Render taxi (таксопарки)
        working-directory: marketing-video
        run: npx remotion render EsepTaxi out/esep-taxi.mp4 --codec=h264 --crf=18

      - name: Upload videos (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: esep-videos
          path: marketing-video/out/*.mp4
          if-no-files-found: error

      - name: Publish to Release (прямая ссылка для скачивания)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: esep-videos
          name: Esep videos
          files: marketing-video/out/*.mp4
          make_latest: true
