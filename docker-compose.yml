services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: studyhub
      POSTGRES_USER: studyhub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-studyhub_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Express + Prisma) ──────────────────────────────────────────────
  backend:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://studyhub:${DB_PASSWORD:-studyhub_dev}@db:5432/studyhub
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      # ── Telegram ─────────────────────────────────────────────────────────
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      # ── AI ───────────────────────────────────────────────────────────────
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # ── Misc ─────────────────────────────────────────────────────────────
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3001"

  # ── Frontend (React → nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_GA_ID: ${VITE_GA_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads:
